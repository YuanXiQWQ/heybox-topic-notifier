name: Check

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read
  deployments: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check
        run: deno task check

  link-deno-deploy:
    name: Link Deno Deploy
    if: github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub deployment link
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const isProduction = branch === "main";
            const environment = isProduction ? "production" : "staging";
            const environmentUrl = isProduction
              ? "https://heybox-topic-notifier.yuanxiqwq.deno.net"
              : "https://heybox-topic-notifier--dev.yuanxiqwq.deno.net";
            const { owner, repo } = context.repo;

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: context.sha,
              auto_merge: false,
              description: `Deno Deploy ${branch} reference`,
              environment,
              production_environment: isProduction,
              required_contexts: [],
              transient_environment: !isProduction,
            });

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              description: `Open Deno Deploy ${branch} deployment`,
              environment,
              environment_url: environmentUrl,
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              state: "success",
            });
