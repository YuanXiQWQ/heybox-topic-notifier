name: Android feed worker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  android-feed-worker:
    runs-on: ubuntu-latest
    env:
      ANDROID_SERIAL: ${{ vars.ANDROID_SERIAL }}
      HEYBOX_ADB_ROOT: ${{ vars.HEYBOX_ADB_ROOT || 'true' }}
      HEYBOX_ANDROID_NAVIGATION: ${{ vars.HEYBOX_ANDROID_NAVIGATION }}
      HEYBOX_ANDROID_PRELAUNCH_MS: ${{ vars.HEYBOX_ANDROID_PRELAUNCH_MS || '0' }}
      HEYBOX_ANDROID_WAIT_MS: ${{ vars.HEYBOX_ANDROID_WAIT_MS || '45000' }}
      HEYBOX_APK_URL: ${{ secrets.HEYBOX_APK_URL || vars.HEYBOX_APK_URL || 'https://dl.max-c.com/app/heybox/heybox-release.apk' }}
      HEYBOX_DEEPLINK_URL: ${{ vars.HEYBOX_DEEPLINK_URL }}
      HEYBOX_TOPIC_ID: ${{ vars.HEYBOX_TOPIC_ID || '12099' }}
      PUBLISH_WORKER_FEED: ${{ vars.PUBLISH_WORKER_FEED || 'true' }}
      POLL_POST_LIMIT: ${{ vars.POLL_POST_LIMIT || '20' }}
      POLL_SORT: ${{ vars.POLL_SORT || 'publishTime' }}
      WORKER_FEED_OUTPUT: worker-feed.json
      WORKER_FEED_DEBUG_OUTPUT: android-worker-debug.txt
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Download Heybox APK
        run: |
          curl --fail --location --show-error "$HEYBOX_APK_URL" --output heybox.apk

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android feed worker
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: arm64-v8a
          profile: pixel_6
          script: |
            deno task android-worker-feed
        env:
          HEYBOX_APK_PATH: heybox.apk

      - name: Verify generated worker feed
        run: deno task validate-worker-feed-file

      - name: Publish worker feed branch
        if: env.PUBLISH_WORKER_FEED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin worker-feed >/dev/null 2>&1; then
            git fetch origin worker-feed
            git worktree add "$publish_dir" origin/worker-feed
          else
            git worktree add --detach "$publish_dir"
          fi

          feed_path="feeds/${HEYBOX_TOPIC_ID}/${POLL_SORT}-${POLL_POST_LIMIT}.json"
          mkdir -p "$publish_dir/$(dirname "$feed_path")"
          cp "$WORKER_FEED_OUTPUT" "$publish_dir/$feed_path"

          cd "$publish_dir"
          git checkout -B worker-feed
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$feed_path"
          if git diff --cached --quiet; then
            echo "No worker feed changes to publish."
            exit 0
          fi
          git commit -m "chore: update worker feed"
          git push origin worker-feed

      - name: Upload worker feed artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heybox-worker-feed
          path: |
            worker-feed.json
            android-worker-debug.txt
          retention-days: 7
