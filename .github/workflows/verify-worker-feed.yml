name: Verify worker feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  verify-worker-feed:
    runs-on: ubuntu-latest
    env:
      HEYBOX_TOPIC_ID: ${{ vars.HEYBOX_TOPIC_ID || '12099' }}
      POLL_POST_LIMIT: ${{ vars.POLL_POST_LIMIT || '20' }}
      POLL_SORT: ${{ vars.POLL_SORT || 'publishTime' }}
      TOPIC_WORKER_TOKEN: ${{ secrets.TOPIC_WORKER_TOKEN }}
      TOPIC_WORKER_URL: ${{ vars.TOPIC_WORKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify configured worker feed
        if: env.TOPIC_WORKER_URL != ''
        run: deno task verify-worker-feed

      - name: Skip until worker feed is configured
        if: env.TOPIC_WORKER_URL == ''
        run: |
          echo "Set repository variable TOPIC_WORKER_URL to enable worker feed verification."
