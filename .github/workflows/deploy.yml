name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check
        run: deno task check

      - name: Deploy staging to Deno Deploy
        if: github.ref_name == 'dev'
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_PROJECT: ${{ secrets.DENO_DEPLOY_PROJECT_DEV }}
        run: |
          test -n "$DENO_DEPLOY_TOKEN"
          test -n "$DENO_DEPLOY_PROJECT"
          deno run -A jsr:@deno/deployctl deploy --project="$DENO_DEPLOY_PROJECT" --entrypoint=src/main.ts --prod

      - name: Deploy production to Deno Deploy
        if: github.ref_name == 'main'
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_PROJECT: ${{ secrets.DENO_DEPLOY_PROJECT_MAIN }}
        run: |
          test -n "$DENO_DEPLOY_TOKEN"
          test -n "$DENO_DEPLOY_PROJECT"
          deno run -A jsr:@deno/deployctl deploy --project="$DENO_DEPLOY_PROJECT" --entrypoint=src/main.ts --prod
