name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check
        run: deno task check

      - name: Deploy staging to Deno Deploy
        if: github.ref_name == 'dev'
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_PROJECT: ${{ secrets.DENO_DEPLOY_PROJECT_DEV }}
        run: |
          missing=0
          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "::error title=Missing secret::Configure DENO_DEPLOY_TOKEN as a repository secret or staging environment secret."
            missing=1
          fi
          if [ -z "$DENO_DEPLOY_PROJECT" ]; then
            echo "::error title=Missing secret::Configure DENO_DEPLOY_PROJECT_DEV as a repository secret or staging environment secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          deno run -A jsr:@deno/deployctl deploy --project="$DENO_DEPLOY_PROJECT" --entrypoint=src/main.ts --prod

      - name: Deploy production to Deno Deploy
        if: github.ref_name == 'main'
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_PROJECT: ${{ secrets.DENO_DEPLOY_PROJECT_MAIN }}
        run: |
          missing=0
          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "::error title=Missing secret::Configure DENO_DEPLOY_TOKEN as a repository secret or production environment secret."
            missing=1
          fi
          if [ -z "$DENO_DEPLOY_PROJECT" ]; then
            echo "::error title=Missing secret::Configure DENO_DEPLOY_PROJECT_MAIN as a repository secret or production environment secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          deno run -A jsr:@deno/deployctl deploy --project="$DENO_DEPLOY_PROJECT" --entrypoint=src/main.ts --prod
